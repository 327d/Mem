<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrueOs</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="auth-container">

    <!-- LOGIN -->
    <div id="login-page" class="auth-page">
        <h2>Login</h2>

        <form id="login-form">
            <input type="text" id="login-identifier" placeholder="Email or Username" required>
            <input type="password" id="login-password" placeholder="Password" required>

            <button type="submit">Sign In</button>
        </form>

        <p>
            Don't have account?
            <button type="button" onclick="showPage('signup-page')">Sign Up</button>
        </p>
    </div>

    <!-- SIGNUP -->
    <div id="signup-page" class="auth-page hidden">
        <h2>Create Account</h2>

        <form id="signup-form">
            <input type="text" id="signup-username" placeholder="Username" required>
            <input type="email" id="signup-email" placeholder="Email" required>
            <input type="password" id="signup-password" placeholder="Password" required>
            <input type="password" id="signup-secret" placeholder="Secret Password" required>

            <button type="submit">Create Account</button>
        </form>

        <p>
            Already have account?
            <button type="button" onclick="showPage('login-page')">Login</button>
        </p>
    </div>

</div>

<!-- MAIN APP -->
<div id="main-app" class="hidden">
    <h2>Welcome</h2>

    <button onclick="logout()">Logout</button>

    <div>
        <h3>Users</h3>
        <div id="users-list"></div>
    </div>

    <div>
        <h3>Chat</h3>
        <div id="chat-messages"></div>

        <input id="chat-input" placeholder="Message">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>
</body>
</html>
